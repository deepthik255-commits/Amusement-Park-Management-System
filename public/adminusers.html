<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users - Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="adminStyling.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
  <a href="adminpanel.html"><span>🎡</span> <span>Admin Panel</span></a>
  <a href="adminusers.html"><i class="fas fa-users"></i> <span>Users</span></a>
  <a href="adminrides.html"><i class="fas fa-rocket"></i> <span>Rides</span></a>
  <a href="adminevents.html"><i class="fas fa-calendar-alt"></i> <span>Events</span></a>
  <a href="adminrestaurants.html"><i class="fas fa-utensils"></i> <span>Restaurants</span></a>
  <a href="allbookings.html"><i class="fas fa-ticket-alt"></i> <span>Booked Tickets</span></a>
  <a href="adminfeedback.html"><i class="fas fa-comment-dots"></i> <span>Feedback</span></a>
  <a href="adminreports.html"><i class="fas fa-chart-line"></i> <span>Reports</span></a>
  <a href="/api/logout"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
</div>
  <!-- Content Section -->
  <div class="content">
    <!-- User Management Section -->
    <div class="container mt-4">
      <section id="users" class="section">
        <h2>Manage Registered Users</h2>
        <div class="card p-3">
          <h5>Registered Users Table</h5>
          <table class="table table-striped" id="users-table">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Full Name</th>
                <th scope="col">Email</th>
                <th scope="col">Password</th>
                <!-- <th scope="col">Actions</th> -->
              </tr>
            </thead>
            <tbody>
              <!-- Users will be dynamically inserted here by JavaScript -->
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Fetch the users from the server and populate the table
    fetch('/api/users')
      .then(response => response.json())
      .then(users => {
        const usersTableBody = document.querySelector('#users-table tbody');
        users.forEach((user, index) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <th scope="row">${index + 1}</th>
            <td>${user.fullname}</td>
            <td>${user.email}</td>
            <td>********</td> <!-- Hide the password for security -->
           
          `;
          usersTableBody.appendChild(row);
        });
      })
      .catch(error => {
        console.error('Error fetching users:', error);
      });
  </script>
</body>
</html>
