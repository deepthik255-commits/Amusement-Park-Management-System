<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - FunLand</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #b29aff, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .register-container {
      background: white;
      padding: 2.5rem 3rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    .register-container h2 {
      color: #0b0708;
      margin-bottom: 1.5rem;
    }

    .register-container input {
      width: 100%;
      padding: 0.8rem;
      margin: 0.6rem 0 0.2rem;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      font-size: 1rem;
    }

    .register-container button {
      width: 100%;
      padding: 0.8rem;
      margin-top: 1rem;
      background-color: #6726e0;
      color: white;
      font-size: 1.1rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .register-container button:hover {
      background-color: #de1fe8;
    }

    .register-container p {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .register-container a {
      color: #f90707;
      text-decoration: none;
    }

    .register-container a:hover {
      text-decoration: underline;
    }

    .error {
      color: red;
      font-size: 0.8rem;
      text-align: left;
      margin-bottom: 0.4rem;
    }
  </style>
</head>

<body>
  <div class="register-container">
    <h2>Create Your Adventure Awaits Account</h2>
    <form id="registerForm" method="POST" action="/api/register" onsubmit="return validateForm()">
      <label for="fullname">Full Name:</label>
      <input name="fullname" id="fullname" type="text" placeholder="Full Name" required />

      <label for="email">Email:</label>
      <input name="email" id="email" type="email" placeholder="Your Email" required />
      <div id="emailError" class="error"></div>

      <label for="password">Password:</label>
      <input name="password" id="password" type="password" placeholder="Your Password" required />
      <div id="passwordError" class="error"></div>

      <label for="confirmPassword">Confirm Password:</label>
      <input name="confirmPassword" id="confirmPassword" type="password" placeholder="Confirm Password" required />
      <div id="confirmError" class="error"></div>

      <button type="submit" class="button">Register</button>
      <p>Already have an account? <a href="./login.html">Login here</a></p>
    </form>
  </div>

  <script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const confirmError = document.getElementById('confirmError');

    emailInput.addEventListener('input', () => {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(emailInput.value)) {
        emailError.textContent = "Please enter a valid email address (e.g., user@example.com).";
      } else {
        emailError.textContent = "";
      }
    });

    passwordInput.addEventListener('input', () => {
      const pwd = passwordInput.value;
      const valid = pwd.length >= 8 && /[0-9]/.test(pwd) && /[\W]/.test(pwd);
      if (!valid) {
        passwordError.textContent = "Password must be at least 8 characters, include a number and a special character.";
      } else {
        passwordError.textContent = "";
      }
    });

    confirmInput.addEventListener('input', () => {
      if (confirmInput.value !== passwordInput.value) {
        confirmError.textContent = "Passwords do not match.";
      } else {
        confirmError.textContent = "";
      }
    });

    function validateForm() {
      if (emailError.textContent || passwordError.textContent || confirmError.textContent) {
        alert("Please fix errors before submitting.");
        return false;
      }
      return true;
    }
  </script>
</body>

</html>
