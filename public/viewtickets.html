<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>View Booked Tickets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; background: #f8f9fa; }
    h2 { margin-bottom: 1.5rem; }
    table th, table td { vertical-align: middle; }
  </style>
</head>
<body>
  <div class="container">
    <h2>All Booked Tickets</h2>
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Age</th>
          <th>Type</th>
          <th>Visit Date</th>
          <th>Quantity</th>
          <th>Meal Plan</th>
          <th>Add-ons</th>
          <th>Booked On</th>
        </tr>
      </thead>
      <tbody id="ticketBody"></tbody>
    </table>
  </div>

  <script>
    fetch('/api/tickets')
      .then(res => res.json())
      .then(tickets => {
        const tbody = document.getElementById('ticketBody');
        tickets.forEach(ticket => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${ticket.fullname}</td>
            <td>${ticket.email}</td>
            <td>${ticket.phone}</td>
            <td>${ticket.age}</td>
            <td>${ticket.ticketType}</td>
            <td>${new Date(ticket.visitDate).toLocaleDateString()}</td>
            <td>${ticket.ticketQuantity}</td>
            <td>${ticket.mealPlan}</td>
            <td>${ticket.addons || '-'}</td>
            <td>${new Date(ticket.bookingDate).toLocaleString()}</td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(err => {
        console.error('Failed to load tickets:', err);
      });
  </script>
</body>
</html>
