<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Awaits Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="userStyling.css" rel="stylesheet">
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-3 sidebar">
        <a href="dashboard.html">🎡 Dashboard</a>
        <!-- <a href="bookings.html"><i class="fas fa-ticket-alt"></i> Bookings</a> -->
        <a href="rides.html"><i class="fas fa-rocket"></i> Rides</a>
        <a href="tickets.html"><i class="fas fa-ticket-alt"></i> Tickets</a>
        <a href="food.html"><i class="fas fa-utensils"></i> Food & Beverages</a>
        <a href="events.html"><i class="fas fa-calendar-alt"></i> Events</a>
        <a href="reviews.html"><i class="fas fa-comment-dots"></i> Visitor Feedback</a>
        <a href="settings.html"><i class="fas fa-cogs"></i> Settings</a>
        <a href="/api/logout" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>

      <div class="col-md-9 content">
        <div class="dashboard-header">
          <h2>Welcome to Your Dashboard</h2>
        </div>

        <div class="carousel">
          <img src="https://images.unsplash.com/photo-1596307880155-bf4edddf34cf?auto=format&fit=crop&w=1470&q=80" alt="Water Slide">
          <img src="https://images.unsplash.com/photo-1572778627925-14e9cfbce81d?auto=format&fit=crop&w=1470&q=80" alt="Amusement Park Night">
        </div>

        <!--  -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const images = document.querySelectorAll('.carousel img');
    let index = 0;

    setInterval(() => {
      images[index].classList.remove('active');
      index = (index + 1) % images.length;
      images[index].classList.add('active');
    }, 3000);
  </script>
</body>

</html>
