<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users - Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="adminStyling.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#">🎡 Admin Panel</a>
    <a href="adminusers.html"><i class="fas fa-users"></i> Users</a>
    <a href="#rides"><i class="fas fa-rocket"></i> Rides</a>
    <a href="#events"><i class="fas fa-calendar-alt"></i> Events</a>
    <a href="viewtickets.html"><i class="fas fa-ticket-alt"></i> Booked Tickets</a>
    <a href="#feedback"><i class="fas fa-comment-dots"></i> Feedback</a>
    <a href="#reports"><i class="fas fa-chart-line"></i> Reports</a>
    <a href="/api/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>

  <!-- Content Section -->
  <div class="content">
    <div class="container mt-4">
      <section id="users" class="section">
        <h2>Manage Registered Users</h2>
        <div class="card p-3">
          <h5>Registered Users Table</h5>
          <table class="table table-striped" id="users-table">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Full Name</th>
                <th scope="col">Email</th>
                <th scope="col">Password</th>
              </tr>
            </thead>
            <tbody>
              <!-- Users will be dynamically inserted here -->
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    fetch('/api/users')
      .then(response => response.json())
      .then(users => {
        const usersTableBody = document.querySelector('#users-table tbody');
        users.forEach((user, index) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <th scope="row">${index + 1}</th>
            <td>${user.fullname}</td>
            <td>${user.email}</td>
            <td>********</td> <!-- Hide the password for security -->
          `;
          usersTableBody.appendChild(row);
        });
      })
      .catch(error => {
        console.error('Error fetching users:', error);
      });
  </script>
</body>
</html>
